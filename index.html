function svgData(svg){
  try{
    const encoded = new TextEncoder().encode(svg);
    let binary = '';
    encoded.forEach(b => binary += String.fromCharCode(b));
    return 'data:image/svg+xml;base64,' + btoa(binary);
  }catch(e){
    return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  }
}

function starShape(cx,cy,r1,r2,n=5){let pts=[];for(let i=0;i<n*2;i++){let a=-Math.PI/2+i*Math.PI/n,r=i%2==0?r1:r2;pts.push((cx+Math.cos(a)*r).toFixed(1)+','+(cy+Math.sin(a)*r).toFixed(1));}return `<polygon points='${pts.join(' ')}'/>`}

function hexToRgb(hex){hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(ch=>ch+ch).join('');let num=parseInt(hex,16);return {r:(num>>16)&255,g:(num>>8)&255,b:num&255}}
function rgbToHex(r,g,b){return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('')}
function mix(hex1,hex2,t){let a=hexToRgb(hex1),b=hexToRgb(hex2);return rgbToHex(a.r+(b.r-a.r)*t,a.g+(b.g-a.g)*t,a.b+(b.b-a.b)*t)}
function lighten(hex,t){return mix(hex,'#ffffff',t)}
function darken(hex,t){return mix(hex,'#000000',t)}

function drawImage(c,i){if(c.kind==='animal')return drawAnimal(c,i);if(c.kind==='person')return drawPerson(c,i);if(c.kind==='vehicle')return drawVehicle(c,i);if(c.kind==='building')return drawBuilding(c,i);if(c.kind==='object')return drawObject(c,i);if(c.kind==='nature')return drawNature(c,i);if(c.kind==='food')return drawFood(c,i);return svgData(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 900 650'>${subjectDefs(i,c.color,c.accent||c.color)}${scene(c,i)}<g filter='url(#paint${i})'><circle cx='450' cy='330' r='120' fill='url(#body${i})'/></g>${illustrationFinish(i)}</svg>`)}
characters.forEach((c,i)=>c.image=drawImage(c,i));let currentIndex=0,gridSize=3,order=[],sel=null,moves=0,done=JSON.parse(localStorage.getItem('sohee100done')||'{}'),music=false,zoomv=Number(localStorage.getItem('sohee100zoom')||'1');function hide(){['start','game','gallery'].forEach(x=>$(x).classList.add('hidden'))}function showStart(){hide();$('start').classList.remove('hidden')}function showGame(){hide();$('game').classList.remove('hidden');load()}function showGallery(){hide();$('gallery').classList.remove('hidden');gallery()}function upd(){$('done').textContent=Object.keys(done).length;$('moves').textContent=moves}
function list(){let b=$('list');b.innerHTML='';characters.forEach((c,i)=>{let x=document.createElement('div');x.className='mini'+(i==currentIndex?' active':'')+(done[c.id]?' done':'');x.innerHTML=`<div class=thumb style="background-image:url('${c.image}')"></div>${done[c.id]?'✅':'🔒'} ${c.title}`;x.onclick=()=>{currentIndex=i;load()};b.appendChild(x)});upd()}function setMode(n){gridSize=n;$('m3').classList.toggle('active',n==3);$('m4').classList.toggle('active',n==4);load()}function solved(){return order.every((v,i)=>v==i)}function shuffle(){moves=0;order=Array.from({length:gridSize*gridSize},(_,i)=>i);for(let i=order.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]]}if(solved())[order[0],order[1]]=[order[1],order[0]];sel=null;draw();$('notice').textContent='조각 두 개를 눌러 자리를 바꿔 보세요.'}function load(){let c=characters[currentIndex];$('title').textContent=c.emoji+' '+c.title;$('preview').style.backgroundImage=`url('${c.image}')`;$('preview').classList.remove('show');$('ansbtn').textContent='👀 정답 보기';shuffle();list()}function draw(){let c=characters[currentIndex],b=$('board');b.innerHTML='';b.style.gridTemplateColumns=`repeat(${gridSize},1fr)`;b.style.gridTemplateRows=`repeat(${gridSize},1fr)`;order.forEach((t,p)=>{let tile=document.createElement('div');tile.className='tile'+(sel==p?' sel':'');tile.style.backgroundImage=`url('${c.image}')`;tile.style.backgroundSize=`${gridSize*100}% ${gridSize*100}%`;let r=Math.floor(t/gridSize),col=t%gridSize;tile.style.backgroundPosition=`${col/(gridSize-1)*100}% ${r/(gridSize-1)*100}%`;tile.onclick=()=>pick(p);b.appendChild(tile)});upd()}function pick(p){if(sel==null){sel=p;draw();return}if(sel==p){sel=null;draw();return}[order[sel],order[p]]=[order[p],order[sel]];sel=null;moves++;draw();if(solved())complete();else $('notice').textContent=`잘하고 있어요! 이동 횟수 ${moves}`}function complete(){let c=characters[currentIndex];done[c.id]=1;localStorage.setItem('sohee100done',JSON.stringify(done));$('notice').textContent='완성했어요! 카드가 열렸어요 🎉';list();$('mi').style.backgroundImage=`url('${c.image}')`;$('mt').textContent=c.title;$('mr').textContent=c.role;$('modal').classList.add('show')}function closeM(){$('modal').classList.remove('show')}function next(){currentIndex=(currentIndex+1)%characters.length;load()}function random(){currentIndex=Math.floor(Math.random()*characters.length);load()}function toggleAns(){$('preview').classList.toggle('show');$('ansbtn').textContent=$('preview').classList.contains('show')?'🙈 정답 숨기기':'👀 정답 보기'}function gallery(){let g=$('grid');g.innerHTML='';characters.forEach((c,i)=>{let ok=done[c.id],card=document.createElement('div');card.className='glass card'+(ok?'':' locked');card.innerHTML=ok?`<div class=gimg style="background-image:url('${c.image}')"></div><div class=ct>${c.title}</div><b>${c.role}</b>`:`<div class=gimg></div><div class=ct>비밀 퍼즐</div>`;g.appendChild(card)})}function toggleMusic(){let a=$('bgm');if(!music){a.volume=.5;a.play();music=true;$('music').textContent='🔇 음악'}else{a.pause();music=false;$('music').textContent='🔊 음악'}}function zoom(d,reset){zoomv=reset?1:Math.max(.7,Math.min(1.4,Math.round((zoomv+d)*10)/10));document.body.style.zoom=zoomv;$('zl').textContent=Math.round(zoomv*100)+'%';localStorage.setItem('sohee100zoom',zoomv)}function full(){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()}zoom(0);if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}));
window.addEventListener('error', function(e){
  const n = document.getElementById('notice');
  if(n){ n.textContent = '그림 표시 오류가 감지되어 새로고침이 필요할 수 있어요: ' + (e.message || ''); }
