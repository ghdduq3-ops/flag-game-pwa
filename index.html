<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소희의 배경 있는 캐릭터 자동차 퍼즐</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#90b96f">
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Arial,"Noto Sans KR",sans-serif;color:#4d4238}
body{
  background:
    radial-gradient(circle at 15% 12%, rgba(255,255,255,.92) 0 30px, transparent 31px),
    radial-gradient(circle at 22% 14%, rgba(255,255,255,.9) 0 42px, transparent 43px),
    radial-gradient(circle at 80% 10%, rgba(255,255,255,.88) 0 34px, transparent 35px),
    linear-gradient(180deg,#d8ecff 0%,#f6f1d5 46%,#a1d07f 78%,#73b567 100%);
  overflow-x:hidden;
}
.hidden{display:none!important}
.app{max-width:1500px;margin:0 auto;padding:8px}
.glass{background:rgba(255,255,255,.93);border:4px solid rgba(255,255,255,.98);border-radius:24px;box-shadow:0 10px 24px rgba(0,0,0,.11)}
.start-screen{min-height:calc(100vh - 16px);display:flex;align-items:center;justify-content:center;text-align:center}
.start-card{width:min(980px,96vw);padding:34px 24px;position:relative;overflow:hidden}
.start-card:before{content:"";position:absolute;left:-70px;top:-70px;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(155,193,122,.36),transparent 70%)}
.start-card:after{content:"";position:absolute;right:-80px;bottom:-80px;width:270px;height:270px;border-radius:50%;background:radial-gradient(circle,rgba(130,164,221,.33),transparent 70%)}
h1{font-size:54px;line-height:1.08;letter-spacing:-3px;margin:8px 0;position:relative;z-index:1}
.c1{color:#d6688a} .c2{color:#7396c9} .c3{color:#6aa35e} .c4{color:#8c74d8} .c5{color:#d29242}
.hero-icons{font-size:74px;letter-spacing:10px;margin:10px 0;position:relative;z-index:1}
.sub{font-size:22px;font-weight:900;color:#665849;margin:12px 0 20px;position:relative;z-index:1}
button{border:0;border-radius:999px;padding:14px 22px;font-size:20px;font-weight:900;color:white;cursor:pointer;box-shadow:0 7px 0 rgba(0,0,0,.15),0 12px 18px rgba(0,0,0,.1);transition:.14s}
button:hover{transform:translateY(-2px);filter:brightness(1.03)}
.btn-purple{background:linear-gradient(180deg,#a896db,#7f6bcf)}
.btn-pink{background:linear-gradient(180deg,#eda8c6,#d96a93)}
.btn-blue{background:linear-gradient(180deg,#8eb9e4,#6e94c5)}
.btn-green{background:linear-gradient(180deg,#8fc777,#5d9c54)}
.btn-orange{background:linear-gradient(180deg,#e8b773,#d39249)}
.btn-gray{background:linear-gradient(180deg,#a7aaa6,#7a7e79)}
.start-buttons{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;position:relative;z-index:1}
#gameScreen{height:100vh;overflow:hidden}
.topbar{display:grid;grid-template-columns:150px 1fr 190px;gap:8px;align-items:center;margin-bottom:8px}
.sidebox{min-height:84px;padding:8px;text-align:center}
.badge{display:inline-block;background:linear-gradient(180deg,#e49ab8,#cd6e91);color:#fff;padding:5px 16px;font-size:18px;font-weight:900;border-radius:999px}
.kid{font-size:34px;display:block;margin-top:3px}
.hero{padding:8px;text-align:center}
.hero h1{font-size:30px;margin:4px 0;letter-spacing:-2px}
.hero .small-sub{display:inline-block;background:linear-gradient(180deg,#8eb9e4,#6e94c5);padding:6px 12px;border-radius:14px;color:#fff;font-weight:900;font-size:13px}
.stat{font-size:13px;font-weight:900;margin-top:3px}
.big{font-size:26px;font-weight:900;color:#d39249;line-height:1}
.layout{display:grid;grid-template-columns:220px minmax(0,1fr);gap:8px;height:calc(100vh - 108px)}
.panel{padding:8px;overflow:hidden}
.panel h2{margin:2px 0 6px;text-align:center;font-size:19px}
.char-list{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:calc(100vh - 170px);overflow:auto;padding-right:3px}
.char-mini{background:#fbf8eb;border:3px solid #d9c788;border-radius:14px;min-height:68px;text-align:center;padding:5px 4px;cursor:pointer;font-size:12px;font-weight:900;transition:.15s;color:#56493d}
.char-mini.active{outline:4px solid #8c74d8;transform:translateY(-2px)}
.char-mini.done{background:#eef8e8;border-color:#8ebc73}
.thumb{height:34px;border-radius:9px;background-size:cover;background-position:center;border:2px solid white;box-shadow:0 3px 7px rgba(0,0,0,.14);margin-bottom:3px}
.stage{background:linear-gradient(180deg,#d9c58a,#b99755);border-radius:24px;padding:8px;box-shadow:0 8px 0 #97753a,0 14px 25px rgba(0,0,0,.16);display:flex;flex-direction:column;min-height:0}
.stage-title{text-align:center;font-size:23px;font-weight:900;color:#553d20;margin-bottom:4px}
.mode-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:4px 0 6px}
.mode{padding:7px 11px;font-size:13px}
.mode.active{outline:4px solid #d96a93}
.puzzle-wrap{display:grid;grid-template-columns:minmax(0,1fr) 132px;gap:8px;align-items:start}
.board{height:min(54vh,540px);width:auto;max-width:100%;margin:0 auto;aspect-ratio:900/650;background:#fff;border:5px solid white;border-radius:16px;box-shadow:inset 0 0 0 3px #d8d8d8,0 8px 15px rgba(0,0,0,.12);display:grid;gap:2px;padding:5px;position:relative;overflow:hidden}
.tile{border-radius:6px;background-repeat:no-repeat;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(255,255,255,.75),0 2px 4px rgba(0,0,0,.14);transition:.12s;position:relative}
.tile:hover{transform:scale(.985);filter:brightness(1.05)}
.tile.selected{outline:5px solid #d96a93;z-index:2;transform:scale(.97)}
.preview-box{background:rgba(255,255,255,.95);border:4px solid #fff;border-radius:18px;padding:8px;text-align:center;box-shadow:0 7px 14px rgba(0,0,0,.11)}
.preview-label{display:block;font-size:12px;font-weight:900;color:#7f6bcf;margin-bottom:6px}
.preview{width:100%;aspect-ratio:900/650;border-radius:12px;background-size:cover;background-position:center;border:3px solid #eee;filter:blur(4px);opacity:.78;transform:scale(.98)}
.notice{text-align:center;font-size:17px;font-weight:900;color:#5a4727;margin-top:6px;min-height:26px}
.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:7px}
#gameScreen button{font-size:15px;padding:9px 10px;box-shadow:0 4px 0 rgba(0,0,0,.16),0 7px 12px rgba(0,0,0,.1)}
.volume{margin-top:3px;text-align:center;font-size:11px;font-weight:900;color:#31566f}
#volumeSlider{width:85px;accent-color:#7f6bcf}
.gallery-screen{padding:18px}
.gallery-header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.gallery-card{padding:14px;text-align:center;min-height:250px;background:rgba(255,255,255,.94);border:4px solid #fff;border-radius:24px;box-shadow:0 8px 18px rgba(0,0,0,.11)}
.gallery-card.locked{filter:grayscale(.6);opacity:.72}
.gallery-img{width:100%;aspect-ratio:900/650;border-radius:14px;background-size:cover;background-position:center;border:3px solid white;box-shadow:0 4px 10px rgba(0,0,0,.12)}
.gallery-title{font-size:21px;font-weight:900;color:#7f6bcf;margin:8px 0 4px}
.gallery-text{text-align:left;font-size:14px;font-weight:800;line-height:1.45;color:#604b42}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.48);display:none;align-items:center;justify-content:center;padding:18px;z-index:1000}
.modal.show{display:flex}
.modal-card{width:min(650px,94vw);background:white;border-radius:32px;border:7px solid #f0d58a;box-shadow:0 18px 44px rgba(0,0,0,.26);padding:24px;text-align:center;position:relative;overflow:hidden;animation:pop .42s ease}
.modal-img{width:100%;max-width:430px;aspect-ratio:900/650;background-size:cover;background-position:center;margin:10px auto;border-radius:18px;border:4px solid #eee}
.modal-title{font-size:38px;font-weight:900;color:#7f6bcf}
.modal-sub{font-size:19px;font-weight:900;color:#5c4a42}
.modal-info{font-size:16px;font-weight:900;color:#5f4a42}
.sparkles{pointer-events:none;position:absolute;inset:0;overflow:hidden}
.spark{position:absolute;font-size:24px;animation:sparkle 1.2s ease-out forwards}
.confetti{position:absolute;width:12px;height:18px;border-radius:3px;top:-20px;animation:fall 1.6s linear forwards}
@keyframes pop{from{transform:scale(.86);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes sparkle{0%{transform:translateY(0) scale(.45);opacity:0}20%{opacity:1}100%{transform:translateY(-75px) scale(1.25);opacity:0}}
@keyframes fall{from{transform:translateY(-10px) rotate(0);opacity:1}to{transform:translateY(440px) rotate(520deg);opacity:0}}
@media(max-width:1120px){#gameScreen{height:auto;overflow:auto}.layout{grid-template-columns:1fr;height:auto}.char-list{grid-template-columns:repeat(4,1fr);max-height:none}.puzzle-wrap{grid-template-columns:1fr}.board{height:auto;width:100%}}
@media(max-width:720px){.app{padding:10px}h1{font-size:38px}.hero h1{font-size:28px}.hero-icons{font-size:54px}.controls{grid-template-columns:1fr}.char-list{grid-template-columns:repeat(2,1fr)}button{font-size:18px}.topbar{grid-template-columns:1fr 1fr}.sidebox{min-height:125px}.kid{font-size:46px}.badge{font-size:22px}}

/* added: more characters/cars + smaller preview for one-screen layout */
#gameScreen .layout{grid-template-columns:250px minmax(0,1fr);height:calc(100vh - 105px)}
#gameScreen .char-list{grid-template-columns:repeat(2,1fr);gap:5px;max-height:calc(100vh - 164px)}
#gameScreen .char-mini{min-height:58px;font-size:11px;padding:4px 3px;border-radius:12px}
#gameScreen .thumb{height:28px;border-radius:8px;margin-bottom:2px}
#gameScreen .puzzle-wrap{grid-template-columns:minmax(0,1fr) 92px;gap:6px}
#gameScreen .preview-box{width:92px;padding:5px;border-radius:14px;align-self:start}
#gameScreen .preview-label{font-size:10px;margin-bottom:4px;line-height:1.1}
#gameScreen .preview{border-radius:9px;border-width:2px;filter:blur(3.8px);opacity:.78}
#gameScreen .board{height:min(56vh,550px);padding:4px}
#gameScreen .stage-title{font-size:21px}
#gameScreen .mode-row{margin:3px 0 5px}
#gameScreen .notice{font-size:16px;margin-top:5px}
#gameScreen .controls{margin-top:6px}
#gameScreen button{font-size:14px;padding:8px 8px}
@media(max-width:1120px){
  #gameScreen .layout{grid-template-columns:1fr;height:auto}
  #gameScreen .char-list{grid-template-columns:repeat(4,1fr);max-height:none}
  #gameScreen .puzzle-wrap{grid-template-columns:1fr}
  #gameScreen .preview-box{width:140px;margin:0 auto}
}


/* added: backgroundless character puzzle + answer preview button */
body{
  background:
    radial-gradient(circle at 15% 12%, rgba(255,255,255,.92) 0 30px, transparent 31px),
    radial-gradient(circle at 22% 14%, rgba(255,255,255,.9) 0 42px, transparent 43px),
    linear-gradient(180deg,#d8ecff 0%,#f6f1d5 46%,#a1d07f 78%,#73b567 100%);
}

#gameScreen .char-list{grid-template-columns:repeat(2,1fr);gap:5px;max-height:calc(100vh - 164px)}

}

/* added: restore beautiful backgrounds inside puzzle images */
#gameScreen .thumb{
  background-size:cover;
  background-repeat:no-repeat;
  background-color:#fffef8;
}

  background-color:#fffef8;
}

  background-size:cover;

}

  background-size:cover;
  background-repeat:no-repeat;
  background-color:#fffef8;

/* added: denser list for more characters/cars */
#gameScreen .char-list{grid-template-columns:repeat(2,1fr);gap:4px;max-height:calc(100vh - 160px)}

/* added: screen zoom controls */
.zoom-controls{
  position:fixed;
  right:12px;
  bottom:12px;
  z-index:2000;
  display:flex;
  gap:6px;
  align-items:center;
  background:rgba(255,255,255,.94);

  border-radius:999px;
  padding:6px;
  box-shadow:0 8px 18px rgba(0,0,0,.16);
}
.zoom-controls button{
  font-size:14px !important;

  box-shadow:0 3px 0 rgba(0,0,0,.16),0 5px 8px rgba(0,0,0,.1) !important;
}
.zoom-label{
  min-width:50px;
  text-align:center;
  font-size:14px;
  font-weight:900;
  color:#5a4727;
}
body.zooming{
  transform-origin:top left;
}
@media(max-width:720px){
  .zoom-controls{
    right:8px;

    padding:4px;

    min-width:36px;
  }

</style>
</head>
<body>
<div id="startScreen" class="app start-screen">
  <div class="glass start-card">
    <h1><span class="c1">소희의</span> <span class="c3">캐릭터</span> <span class="c4">퍼즐</span> <span class="c5">맞추기</span></h1>
    <div class="hero-icons">👑 🧩 🐰 🦄 🤖 🧚</div>
    <div class="sub">예쁜 배경 속 소희와 캐릭터·자동차 퍼즐을 맞추고, 화면 크기도 조절해 보세요!</div>
    <div class="start-buttons">
      <button class="btn-purple" onclick="showGame(true)">▶ 시작하기</button>
      <button class="btn-green" onclick="showGame(false)">↻ 이어하기</button>
      <button class="btn-blue" onclick="showGallery()">📚 캐릭터 도감</button>
    </div>
  </div>
</div>

<div id="gameScreen" class="app hidden">
  <section class="topbar">
    <div class="glass sidebox"><div class="badge">소희</div><span class="kid">👧</span></div>
    <div class="glass hero">
      <h1><span class="c1">소희의</span> <span class="c3">캐릭터</span> <span class="c4">퍼즐</span></h1>
      <div class="small-sub">조각 두 개를 눌러 서로 자리를 바꿔 주세요</div>
    </div>
    <div class="glass sidebox"><div class="stat">완성한 캐릭터</div><div class="big"><span id="doneCount">0</span> / <span id="totalCount">0</span></div><div class="stat">이동 횟수 <span id="moveCount">0</span></div></div>
  </section>
  <section class="layout">
    <aside class="glass panel"><h2>🌿 캐릭터 · 자동차</h2><div id="charList" class="char-list"></div></aside>
    <main class="stage">
      <div id="stageTitle" class="stage-title">캐릭터 퍼즐</div>
      <div class="mode-row">
        <button id="mode3" class="btn-purple mode active" onclick="setMode(3)">쉬움 3×3</button>
        <button id="mode4" class="btn-blue mode" onclick="setMode(4)">보통 4×4</button>
      </div>
      <div class="puzzle-wrap">
        <div id="board" class="board"></div>
        <div id="previewBox" class="preview-box">
          <button id="answerBtn" class="answer-btn" onclick="toggleAnswerPreview()">👀 정답 보기</button>
          <div id="preview" class="preview answer-hidden"></div>
        </div>
      </div>
      <div id="notice" class="notice">조각 두 개를 눌러 자리를 바꿔 보세요.</div>
      <div class="controls">
        <button class="btn-orange" onclick="shuffleCurrent()">🔀 다시 섞기</button>
        <button class="btn-green" onclick="nextCharacter()">➡ 다음 캐릭터</button>
        <button class="btn-blue" onclick="showGallery()">📚 도감 보기</button>
      </div>
      <div class="controls" style="margin-top:7px">
        <button class="btn-gray" onclick="showStart()">🏠 처음으로</button>
        <button class="btn-pink" onclick="randomCharacter()">🎲 랜덤 캐릭터</button>
        <div style="text-align:center">
          <button id="musicBtn" class="btn-purple" onclick="toggleMusic()">🔊 음악 켜기</button>
          <div class="volume">볼륨 <input id="volumeSlider" type="range" min="0" max="100" value="52" oninput="setMusicVolume(this.value)"></div>
        </div>
      </div>
    </main>
  </section>
</div>

<div id="galleryScreen" class="app gallery-screen hidden">
  <div class="gallery-header">
    <h1 style="font-size:42px;margin:0"><span class="c2">캐릭터</span> <span class="c4">도감</span></h1>
    <div><button class="btn-purple" onclick="showGame(false)">🧩 퍼즐 맞추기</button><button class="btn-gray" onclick="showStart()">🏠 처음으로</button></div>
  </div>
  <div id="galleryGrid" class="gallery-grid"></div>
</div>

<div id="completeModal" class="modal">
  <div class="modal-card">
    <div id="sparkles" class="sparkles"></div>
    <div class="modal-title">퍼즐 완성!</div>
    <div id="modalSub" class="modal-sub">캐릭터 카드가 열렸어요.</div>
    <div id="modalImg" class="modal-img"></div>
    <div id="modalInfo" class="modal-info"></div>
    <div style="margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn-green" onclick="closeModal(); nextCharacter();">다음 캐릭터</button>
      <button class="btn-blue" onclick="closeModal(); showGallery();">도감 보기</button>
      <button class="btn-purple" onclick="closeModal()">계속 보기</button>
    </div>
  </div>
</div>

<div class="zoom-controls" aria-label="화면 크기 조절">
  <button class="btn-blue" onclick="changeZoom(-0.1)" title="화면 줄이기">－</button>
  <span id="zoomLabel" class="zoom-label">100%</span>
  <button class="btn-green" onclick="changeZoom(0.1)" title="화면 키우기">＋</button>
  <button class="btn-gray" onclick="resetZoom()" title="기본 크기">100</button>
  <button class="btn-purple" onclick="toggleFullscreen()" title="전체화면">⛶</button>
</div>

let currentIndex = Number(localStorage.getItem("morePuzzleCurrent") || "0");
if(currentIndex < 0 || currentIndex >= characters.length) currentIndex = 0;
let gridSize = Number(localStorage.getItem("morePuzzleGrid") || "3");
let order = []; let selectedTile = null; let moves = 0;
let completed = JSON.parse(localStorage.getItem("morePuzzleCompleted") || "{}") || {};
let musicOn = false;
function $(id){return document.getElementById(id)}
function hideAll(){["startScreen","gameScreen","galleryScreen"].forEach(id=>$(id).classList.add("hidden"))}
function showStart(){hideAll(); $("startScreen").classList.remove("hidden")}
function showGame(newStart){hideAll(); $("gameScreen").classList.remove("hidden"); if(newStart && Object.keys(completed).length===0) currentIndex=0; loadCharacter(true)}
function showGallery(){hideAll(); $("galleryScreen").classList.remove("hidden"); renderGallery()}
function save(){localStorage.setItem("morePuzzleCurrent", String(currentIndex)); localStorage.setItem("morePuzzleGrid", String(gridSize))}
function updateCounts(){$("doneCount").textContent = Object.keys(completed).length; $("totalCount").textContent = characters.length; $("moveCount").textContent = moves;}
function renderCharacterList(){
  const box = $("charList"); box.innerHTML = "";
  characters.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "char-mini" + (i===currentIndex?" active":"") + (completed[c.id]?" done":"");
    div.innerHTML = `<div class="thumb" style="background-image:url('${c.image}')"></div>${completed[c.id] ? "✅ " : "🔒 "}${c.title}`;
    div.onclick = () => { currentIndex=i; save(); loadCharacter(true); };
    box.appendChild(div);
  });
  updateCounts();
}
function renderGallery(){
  const box=$("galleryGrid"); box.innerHTML="";
  characters.forEach((c, i)=>{
    const ok=!!completed[c.id];
    const card=document.createElement('div');
    card.className='gallery-card glass'+(ok?'':' locked');
    card.innerHTML = ok ? `
      <div class="gallery-img" style="background-image:url('${c.image}')"></div>
      <div class="gallery-title">${c.title}</div>
      <div class="gallery-text"><b>역할</b>: ${c.role}</div>
      <button class="btn-green" style="margin-top:10px;padding:10px 14px;font-size:16px" onclick="currentIndex=${i}; showGame(false)">다시 맞추기</button>`
      : `
      <div class="gallery-img" style="background:linear-gradient(135deg,#e4e1d8,#faf8f1)"></div>
      <div class="gallery-title">비밀 캐릭터</div>
      <div class="gallery-text">퍼즐을 완성하면 캐릭터 카드가 열려요.</div>
      <button class="btn-pink" style="margin-top:10px;padding:10px 14px;font-size:16px" onclick="currentIndex=${i}; showGame(false)">퍼즐 맞추기</button>`;
    box.appendChild(card);
  })
}
function setMode(n){gridSize=n; $("mode3").classList.toggle("active",n===3); $("mode4").classList.toggle("active",n===4); save(); loadCharacter(true);}
function loadCharacter(reshuffle){ const c=characters[currentIndex]; $("stageTitle").textContent=`${c.emoji} ${c.title}`; $("preview").style.backgroundImage=`url('${c.image}')`; hideAnswerPreview(); if(reshuffle || order.length!==gridSize*gridSize) shuffleCurrent(); else renderBoard(); renderCharacterList(); }

function hideAnswerPreview(){
  const box = $("previewBox");
  const btn = $("answerBtn");
  const prev = $("preview");
  if(box) box.classList.remove("show-answer");
  if(prev) prev.classList.add("answer-hidden");
  if(btn) btn.textContent = "👀 정답 보기";
}
function toggleAnswerPreview(){
  const box = $("previewBox");
  const btn = $("answerBtn");
  const prev = $("preview");
  if(!box || !btn || !prev) return;
  const showing = box.classList.toggle("show-answer");
  prev.classList.toggle("answer-hidden", !showing);
  btn.textContent = showing ? "🙈 정답 숨기기" : "👀 정답 보기";
}

function makeSolvedOrder(){ return Array.from({length:gridSize*gridSize},(_,i)=>i); }
function shuffleCurrent(){ moves=0; order=makeSolvedOrder(); for(let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; } if(isSolved()) [order[0],order[1]]=[order[1],order[0]]; selectedTile=null; renderBoard(); $("notice").textContent="조각 두 개를 눌러 자리를 바꿔 보세요."; }
function renderBoard(){
  const c=characters[currentIndex]; const board=$("board"); board.innerHTML=""; board.style.gridTemplateColumns=`repeat(${gridSize},1fr)`; board.style.gridTemplateRows=`repeat(${gridSize},1fr)`;
  order.forEach((tileIndex,pos)=>{ const tile=document.createElement('div'); tile.className='tile'+(selectedTile===pos?' selected':''); tile.style.backgroundImage=`url('${c.image}')`; tile.style.backgroundSize=`${gridSize*100}% ${gridSize*100}%`; const row=Math.floor(tileIndex/gridSize); const col=tileIndex%gridSize; tile.style.backgroundPosition=`${(col/(gridSize-1))*100}% ${(row/(gridSize-1))*100}%`; tile.onclick=()=>selectTile(pos); board.appendChild(tile); });
  updateCounts();
}
function selectTile(pos){ if(selectedTile===null){selectedTile=pos; renderBoard(); return;} if(selectedTile===pos){selectedTile=null; renderBoard(); return;} [order[selectedTile],order[pos]]=[order[pos],order[selectedTile]]; selectedTile=null; moves++; renderBoard(); if(isSolved()) completePuzzle(); else $("notice").textContent=`잘하고 있어요! 이동 횟수 ${moves}`; }
function isSolved(){ return order.every((v,i)=>v===i); }
function completePuzzle(){ const c=characters[currentIndex]; if(!completed[c.id]){completed[c.id]=true; localStorage.setItem('morePuzzleCompleted', JSON.stringify(completed));} $("notice").textContent='완성했어요! 캐릭터 카드가 열렸어요 🎉'; renderCharacterList(); setTimeout(()=>{showCompleteModal(c); playRewardSound();},250); }
function showCompleteModal(c){ $("modalSub").textContent=`${c.title} 카드가 열렸어요.`; $("modalImg").style.backgroundImage=`url('${c.image}')`; $("modalInfo").innerHTML=`<b>${c.title}</b><br>${c.role}`; $("completeModal").classList.add('show'); createCelebration(); }
function closeModal(){ $("completeModal").classList.remove('show'); $("sparkles").innerHTML=''; }
$("completeModal").addEventListener('click', e=>{ if(e.target.id==='completeModal') closeModal(); });
function nextCharacter(){ closeModal(); currentIndex=(currentIndex+1)%characters.length; save(); loadCharacter(true); }
function randomCharacter(){ closeModal(); currentIndex=Math.floor(Math.random()*characters.length); save(); loadCharacter(true); }
function createCelebration(){ const box=$("sparkles"); box.innerHTML=''; const icons=['✨','⭐','💖','🍃','🧩','🌈']; for(let i=0;i<16;i++){ const s=document.createElement('div'); s.className='spark'; s.textContent=icons[i%icons.length]; s.style.left=(10+Math.random()*80)+'%'; s.style.bottom=(20+Math.random()*30)+'%'; s.style.animationDelay=(Math.random()*0.3)+'s'; box.appendChild(s); } const colors=['#d96a93','#f2c84b','#8eb9e4','#8fc777','#8c74d8','#d39249']; for(let i=0;i<28;i++){ const c=document.createElement('div'); c.className='confetti'; c.style.left=(Math.random()*96)+'%'; c.style.background=colors[i%colors.length]; c.style.animationDelay=(Math.random()*0.35)+'s'; box.appendChild(c); } }
function toggleMusic(){ const bgm=$("bgm"); const btn=$("musicBtn"); bgm.volume = Number($("volumeSlider").value||52)/100; if(!musicOn){ bgm.play().then(()=>{musicOn=true; btn.textContent='🔇 음악 끄기';}).catch(()=>alert('브라우저에서 음소거를 해제한 뒤 다시 눌러 주세요.')); } else { bgm.pause(); bgm.currentTime=0; musicOn=false; btn.textContent='🔊 음악 켜기'; } }
function setMusicVolume(v){ $("bgm").volume = Number(v)/100; }
function playRewardSound(){ try{ const ctx = new (window.AudioContext || window.webkitAudioContext)(); [523.25,659.25,783.99,1046.5].forEach((f,i)=>{ const o=ctx.createOscillator(), g=ctx.createGain(); o.type='triangle'; o.frequency.value=f; g.gain.value=0; o.connect(g); g.connect(ctx.destination); const t=ctx.currentTime+i*0.11; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.17,t+0.02); g.gain.exponentialRampToValueAtTime(0.001,t+0.22); o.start(t); o.stop(t+0.25); }); }catch(e){} }

let appZoom = Number(localStorage.getItem("soheeAppZoom") || "1");
function applyZoom(){
  if(appZoom < 0.7) appZoom = 0.7;
  if(appZoom > 1.4) appZoom = 1.4;
  document.body.style.zoom = appZoom;
  const label = document.getElementById("zoomLabel");
  if(label) label.textContent = Math.round(appZoom * 100) + "%";
  localStorage.setItem("soheeAppZoom", String(appZoom));
}
function changeZoom(delta){
  appZoom = Math.round((appZoom + delta) * 10) / 10;
  applyZoom();
}
function resetZoom(){
  appZoom = 1;
  applyZoom();
}
function toggleFullscreen(){
  const el = document.documentElement;
  if(!document.fullscreenElement){
    if(el.requestFullscreen) el.requestFullscreen();
  }else{
    if(document.exitFullscreen) document.exitFullscreen();
  }
}

applyZoom();
setMode(gridSize); updateCounts();
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{})); }
</script>
